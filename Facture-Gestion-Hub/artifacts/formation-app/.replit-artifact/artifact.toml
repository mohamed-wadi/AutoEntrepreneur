kind = "web"
previewPath = "/"
title = "Gestion Formations"
version = "1.0.0"
id = "artifacts/formation-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19509

[services.development]
run = "pnpm --filter @workspace/formation-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/formation-app", "run", "build" ]
publicDir = "artifacts/formation-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19509"
BASE_PATH = "/"
