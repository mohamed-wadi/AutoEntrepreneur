openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Formation management platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: clients
    description: Client management
  - name: invoices
    description: Invoice management
  - name: declarations
    description: Quarterly declaration calculations
  - name: stats
    description: Statistics and summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    delete:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current logged in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientBody"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      parameters:
        - name: trimestre
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: year
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: statut
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create a new invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/next-numero:
    get:
      operationId: getNextNumeroFacture
      tags: [invoices]
      summary: Get the next auto-incremented invoice number
      responses:
        "200":
          description: Next invoice number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextNumeroFacture"

  /invoices/prestations:
    get:
      operationId: listPrestations
      tags: [invoices]
      summary: Get distinct prestations from existing invoices sorted by frequency
      responses:
        "200":
          description: List of prestation strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /invoices/parse-docx:
    post:
      operationId: parseDocx
      tags: [invoices]
      summary: Parse a Word invoice document and extract fields
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: Extracted invoice fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseDocxResult"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get an invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceBody"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /declarations:
    get:
      operationId: listDeclarations
      tags: [declarations]
      summary: Get quarterly declaration summary for a year
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Quarterly declarations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuarterlyDeclaration"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get yearly and per-trimestre statistics
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, viewer]
      required:
        - id
        - username
        - role

    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        city:
          type: ["string", "null"]
        contact:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        ice:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt

    CreateClientBody:
      type: object
      properties:
        name:
          type: string
        city:
          type: ["string", "null"]
        contact:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        ice:
          type: ["string", "null"]
      required:
        - name

    UpdateClientBody:
      type: object
      properties:
        name:
          type: string
        city:
          type: ["string", "null"]
        contact:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        ice:
          type: ["string", "null"]

    Invoice:
      type: object
      properties:
        id:
          type: integer
        numeroFacture:
          type: string
        trimestre:
          type: string
          enum: [T1, T2, T3, T4]
        year:
          type: integer
        dateFormation:
          type: ["string", "null"]
        dateFacture:
          type: ["string", "null"]
        clientId:
          type: ["integer", "null"]
        clientName:
          type: ["string", "null"]
        clientIce:
          type: ["string", "null"]
        cabinet:
          type: ["string", "null"]
        ville:
          type: ["string", "null"]
        prestation:
          type: string
        montantDh:
          type: number
        impotAPayer:
          type: number
        cnss:
          type: number
        modePaiement:
          type: ["string", "null"]
          enum: [virement, cheque, espece, null]
        numeroPaiement:
          type: ["string", "null"]
        datePaiement:
          type: ["string", "null"]
        statut:
          type: string
          enum: [paye, regle, en_attente]
        dateDeclaration:
          type: ["string", "null"]
        invoiceFileUrl:
          type: ["string", "null"]
        invoiceDocxUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - numeroFacture
        - trimestre
        - year
        - prestation
        - montantDh
        - impotAPayer
        - cnss
        - statut
        - createdAt

    CreateInvoiceBody:
      type: object
      properties:
        numeroFacture:
          type: string
        trimestre:
          type: string
          enum: [T1, T2, T3, T4]
        year:
          type: integer
        dateFormation:
          type: ["string", "null"]
        dateFacture:
          type: ["string", "null"]
        clientId:
          type: ["integer", "null"]
        cabinet:
          type: ["string", "null"]
        ville:
          type: ["string", "null"]
        prestation:
          type: string
        montantDh:
          type: number
        modePaiement:
          type: ["string", "null"]
          enum: [virement, cheque, espece, null]
        numeroPaiement:
          type: ["string", "null"]
        datePaiement:
          type: ["string", "null"]
        statut:
          type: string
          enum: [paye, regle, en_attente]
        dateDeclaration:
          type: ["string", "null"]
        invoiceFileUrl:
          type: ["string", "null"]
        invoiceDocxUrl:
          type: ["string", "null"]
      required:
        - numeroFacture
        - trimestre
        - year
        - prestation
        - montantDh
        - statut

    UpdateInvoiceBody:
      type: object
      properties:
        numeroFacture:
          type: string
        trimestre:
          type: string
          enum: [T1, T2, T3, T4]
        year:
          type: integer
        dateFormation:
          type: ["string", "null"]
        dateFacture:
          type: ["string", "null"]
        clientId:
          type: ["integer", "null"]
        cabinet:
          type: ["string", "null"]
        ville:
          type: ["string", "null"]
        prestation:
          type: string
        montantDh:
          type: number
        modePaiement:
          type: ["string", "null"]
          enum: [virement, cheque, espece, null]
        numeroPaiement:
          type: ["string", "null"]
        datePaiement:
          type: ["string", "null"]
        statut:
          type: string
          enum: [paye, regle, en_attente]
        dateDeclaration:
          type: ["string", "null"]
        invoiceFileUrl:
          type: ["string", "null"]
        invoiceDocxUrl:
          type: ["string", "null"]

    NextNumeroFacture:
      type: object
      properties:
        numeroFacture:
          type: string
        sequence:
          type: integer
      required:
        - numeroFacture
        - sequence

    ParseDocxResult:
      type: object
      properties:
        numeroFacture:
          type: ["string", "null"]
        dateFacture:
          type: ["string", "null"]
        cabinet:
          type: ["string", "null"]
        ice:
          type: ["string", "null"]
        clientId:
          type: ["integer", "null"]
        clientName:
          type: ["string", "null"]
        prestation:
          type: ["string", "null"]
        dateFormation:
          type: ["string", "null"]
        montantDh:
          type: ["number", "null"]
        numeroPaiement:
          type: ["string", "null"]
        confidence:
          type: object
          additionalProperties:
            type: number
      required:
        - confidence

    QuarterlyDeclaration:
      type: object
      properties:
        trimestre:
          type: string
          enum: [T1, T2, T3, T4]
        year:
          type: integer
        totalMontant:
          type: number
        totalInvoices:
          type: integer
        paidInvoices:
          type: integer
        pendingInvoices:
          type: integer
        impotsAPayer:
          type: number
        cnssAPayer:
          type: number
        dateDeclaration:
          type: ["string", "null"]
      required:
        - trimestre
        - year
        - totalMontant
        - totalInvoices
        - paidInvoices
        - pendingInvoices
        - impotsAPayer
        - cnssAPayer

    TrimestreStats:
      type: object
      properties:
        trimestre:
          type: string
          enum: [T1, T2, T3, T4]
        totalMontant:
          type: number
        totalInvoices:
          type: integer
        paidCount:
          type: integer
        pendingCount:
          type: integer
      required:
        - trimestre
        - totalMontant
        - totalInvoices
        - paidCount
        - pendingCount

    Stats:
      type: object
      properties:
        year:
          type: integer
        totalMontantAnnuel:
          type: number
        totalInvoices:
          type: integer
        unpaidCount:
          type: integer
        totalImpotsAnnuel:
          type: number
        totalCnssAnnuel:
          type: number
        byTrimestre:
          type: array
          items:
            $ref: "#/components/schemas/TrimestreStats"
      required:
        - year
        - totalMontantAnnuel
        - totalInvoices
        - unpaidCount
        - totalImpotsAnnuel
        - totalCnssAnnuel
        - byTrimestre
