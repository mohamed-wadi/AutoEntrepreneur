name: WhatsApp Reminder

on:
  schedule:
    # Every hour; script sends only at 09:xx Casablanca time.
    - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Force immediate send (bypass hour and J-10/J-5 checks)"
        required: false
        default: "false"

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run WhatsApp reminder
        env:
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_API_VERSION: ${{ secrets.WHATSAPP_API_VERSION }}
          DECLARATION_REMINDER_WHATSAPP_TO: ${{ secrets.DECLARATION_REMINDER_WHATSAPP_TO }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
          FORCE_SEND: ${{ github.event.inputs.force_send || 'false' }}
        run: node "Facture-Gestion-Hub/scripts/whatsapp-reminder.mjs"
